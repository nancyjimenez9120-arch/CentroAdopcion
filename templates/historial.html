<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Adopciones</title>
    <style>
        body { 
            background-color: #fdf6e3; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        /* Color del título principal */
        h1 { color: #5d4037; margin-bottom: 30px; }

        table { 
            width: 90%; 
            margin: 20px auto; 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-collapse: collapse;
        }
        /* Color de la cabecera de la tabla */
        th { 
            background-color: #ff8a65; 
            color: white; 
            padding: 15px; 
            text-transform: uppercase;
            font-size: 0.9em;
        }
        /* Color de las letras en las filas */
        td { 
            padding: 12px; 
            border-bottom: 1px solid #eee; 
            color: #4e342e; /* Marrón oscuro para mejor lectura */
            font-weight: 500;
        }
        tr:nth-child(even) { background-color: #fffaf0; }
        tr:hover { background-color: #fbe9e7; }

        /* Estilo del Botón Volver */
        .btn-volver {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #8d6e63;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-volver:hover { background-color: #5d4037; }
    </style>
</head>
<body>

    <h1>📜 Historial de Adopciones</h1>

    <table>
        <thead>
            <tr>
                <th>Adoptante</th>
                <th>Apellido</th>
                <th>Perrito</th>
                <th>Raza</th>
                <th>Fecha de Adopción</th>
            </tr>
        </thead>
        <tbody>
            {% for registro in adopciones %}
            <tr>
                <td>{{ registro[0] }}</td>
                <td>{{ registro[1] }}</td>
                <td>{{ registro[2] }}</td>
                <td>{{ registro[3] }}</td>
                <td>{{ registro[4] }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" style="padding: 20px; color: #999;">Aún no se han realizado adopciones.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="/" class="btn-volver">← Volver al Catálogo</a>

</body>
</html>
